<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/rezet.css">
    <link rel="stylesheet" href="./css/heder.css">
    <link rel="stylesheet" href="./css/result.css">
</head>

<body>

    <header></header>


    <main class="results-page">
        <div class="choisTrain">
            <h2 class="results-title">აირჩიეთ თქვენთვის სასურველი მატარებელი</h2>
        </div>
        <p class="trainTitl">მატარებლების ჩამონათვალი</p>
        <div class="titli">
            <p class="col-name textTitli">მატარებლის სახელი</p>
            <p class="col-departure textTitli">გამგზავრება</p>
            <p class="col-arrival textTitli">ჩასვლა</p>
            <div class="col-action">
            </div>
        </div>
        <div id="trainListContainer" class="train-list">
        </div>


        <div id="chat-widget-container">
            <div id="chat-window" class="chat-window">
                <div class="chat-header">
                    <span>🚆 რკინიგზის ასისტენტი</span>
                    <button class="close-chat" onclick="toggleChat()">✕</button>
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="ai-msg"><b>AI:</b> გამარჯობა! რით შემიძლია დაგეხმაროთ?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="ჩაწერეთ კითხვა..."
                        onkeypress="handleKeyPress(event)">

                    <button type="button" id="sendBtn" onclick="sendMessage(event)">გაგზავნა</button>
                </div>
            </div>

            <button id="chat-toggle-btn" class="chat-toggle-btn" onclick="toggleChat()">
                💬
            </button>
        </div>

    </main>

    <footer class="footerSR">
        <div class="footerRailway">
            <p class="footerText">©2023 <span class="stepRail">Step Railway. </span> ყველა უფლება დაცულია.</p>
        </div>
    </footer>

    <script src="./js/result.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/ai-logic.js"></script>

</body>

</html>
