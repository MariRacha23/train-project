<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/rezet.css">
    <link rel="stylesheet" href="./css/heder.css">
    <link rel="stylesheet" href="./css/check.css">
</head>
<body>
    <header></header>

    <main>
    <section class="page-banner">
        <div class="container">
            <h1>ბილეთის შემოწმება და გაუქმება</h1>
        </div>
    </section>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="ticket-id-input" placeholder="შეიყვანეთ ბილეთის ID (მაგ: e3336ad6...)">
            <button onclick="checkTicket()">ძებნა</button>
        </div>
    </div>

   <div id="ticket-result-container" style="display: none;">
    <div id="invoice-to-print" class="invoice-box">
        <div class="passengers-section">
            <p class="passengersList">მგზავრები:</p>
            
            <div class="passengers-header">
                <div>სახელი</div>
                <div>გვარი</div>
                <div>პირადი ნომერი</div>
                <div>ადგილი</div>
            </div>

            <div id="passenger-rows"></div>
        </div>
    </div>
</div>
        
        <div class="delete-action-zone">
            <button onclick="cancelTicket()" class="cancel-btn">ბილეთის გაუქმება</button>
        </div>
    </div>
</main>


  <footer class="footerSR">
        <div class="footerRailway">
            <p class="footerText">©2023 <span class="stepRail">Step Railway. </span> ყველა უფლება დაცულია.</p>
        </div>
    </footer>

<script src="./js/header.js"></script>
<script src="./js/check.js"></script>
    
</body>
</html>
